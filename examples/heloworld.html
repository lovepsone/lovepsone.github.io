<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>heloworld</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  </head>
  <body>
    <script type="module">

		import * as THREE from './libs/three.module.js';
		import { OrbitControls } from './libs/OrbitControls.js';
		import { WEBLPhy } from './../WEBLPhy/physics.js';

		let camera, scene, renderer, mesh;
		let phy;
		const lookAt = new THREE.Vector3( 0, 0, 0 );
		

		function init() {

			camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.1, 100 );
			camera.position.set( - 1, 1.5, 2 );
			camera.lookAt( 0, 0.5, 0 );

			scene = new THREE.Scene();
			scene.background = new THREE.Color( 0x666666 );
			const color = new THREE.Color();

			phy = new WEBLPhy({THREEScene: scene});
/*
			const geometry = new THREE.BoxGeometry( 20, 20, 20 );
			const material = new THREE.MeshBasicMaterial( { color: 0xffff00 } );
			mesh = new THREE.Mesh( geometry, material );
			mesh.position.y = 80;
			scene.add( mesh );
			phy.addMesh( mesh, { mass: 10, isDynamic: true } );
*/
			for ( let i = 0; i < 10; i ++ ) {

				const geometry = new THREE.BoxGeometry( 0.075, 0.075, 0.075 );
				const material = new THREE.MeshBasicMaterial( { color: color.setHex( 0xffffff * Math.random() ) } );
				const box = new THREE.Mesh( geometry, material );
				box.setPosition( Math.random() - 0.5, Math.random() * 2, Math.random() - 0.5 );
				scene.add( box );
				phy.addMesh( box, { mass: 100, isDynamic: true } );
			}

			const pg = new THREE.PlaneGeometry(300, 300, 299, 299 );
			pg.rotateX( - Math.PI / 2 );
			const plane = new THREE.Mesh( pg, new THREE.MeshBasicMaterial( { color: 0x00aa00 } ) );
			scene.add( plane );
			phy.addMesh( plane );

			renderer = new THREE.WebGLRenderer( { antialias: true } );
			//renderer.setClearColor(0x808080);
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.setSize( window.innerWidth, window.innerHeight );
			renderer.setAnimationLoop( animate );
			document.body.appendChild( renderer.domElement );

			const controls = new OrbitControls( camera, renderer.domElement );
			controls.target.y = 0.5;
			controls.update();

			window.addEventListener( 'resize', onWindowResize );

		}

		init();

		function onWindowResize() {

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();

			renderer.setSize( window.innerWidth, window.innerHeight );

		}

		function animate() {

			if ( phy ) phy.stepSimulation( 0.1, 1/60 );

			renderer.render( scene, camera );

		}
	</script>
  </body>
</html>
