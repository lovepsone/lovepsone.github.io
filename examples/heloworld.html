<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>heloworld</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  </head>
  <body>
    <script type="module">

		import * as THREE from './libs/three.module.js';
		import {WEBLPhy} from './../WEBLPhy/physics.js';

		let camera, scene, renderer, mesh;
		let phy;
		const lookAt = new THREE.Vector3( 0, 0, 0 );
		

		function init() {

			camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.1, 100 );
			camera.position.z = 40;
			camera.position.y = 100;
			camera.lookAt(lookAt);

			scene = new THREE.Scene();

			phy = new WEBLPhy({THREEScene: scene});
			const geometry = new THREE.BoxGeometry( 20, 20, 20 );
			const material = new THREE.MeshBasicMaterial( { color: 0xffff00 } );

			mesh = new THREE.Mesh( geometry, material );
			mesh.position.y = 80;
			scene.add( mesh );
			phy.addMesh( mesh, { mass: 10, isDynamic: true } );
			
			const pg = new THREE.PlaneGeometry( 1024, 1024, 1023, 1023 );
			pg.rotateX( - Math.PI / 2 );
			pg.computeBoundingBox();
			pg.center();

			const plane = new THREE.Mesh( pg, new THREE.MeshBasicMaterial( { color: 0xaaaaaa } ) );
			scene.add( plane );
			phy.addMesh( plane );

			renderer = new THREE.WebGLRenderer( { antialias: true } );
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.setSize( window.innerWidth, window.innerHeight );
			renderer.setAnimationLoop( animate );
			document.body.appendChild( renderer.domElement );


			window.addEventListener( 'resize', onWindowResize );

		}

		init();

		function onWindowResize() {

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();

			renderer.setSize( window.innerWidth, window.innerHeight );

		}

		function animate() {

			//mesh.rotation.x += 0.005;
			//mesh.rotation.y += 0.01;

			renderer.render( scene, camera );

			if ( phy ) phy.stepSimulation( 0.1, 1/60 );
		}
	</script>
  </body>
</html>
