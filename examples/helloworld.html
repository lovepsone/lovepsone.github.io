<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>heloworld</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  </head>
  <body>
    <script type="module">

		import * as THREE from './libs/three.module.js';
		import { OrbitControls } from './libs/OrbitControls.js';
		import { WEBLPhy } from './../WEBLPhy/physics.js';

		let camera, scene, renderer, mesh, phy;
		
		function init() {

			camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.1, 1000 );
			camera.position.set( - 50, 45, 80 );
			camera.lookAt( 0, 5, 0 );

			scene = new THREE.Scene();
			scene.background = new THREE.Color( 0x666666 );
			const color = new THREE.Color();

			phy = new WEBLPhy();

			for ( let i = 0; i < 100; i ++ ) {

				const geometry = new THREE.BoxGeometry( 6, 6, 6 );
				const geometry2 = new THREE.SphereGeometry(3, 20, 20); 
				const material = new THREE.MeshBasicMaterial( { color: color.setHex( 0xffffff * Math.random() ) } );
				const box = new THREE.Mesh( geometry, material );
				box.position.set( Math.random() - 25, Math.random() * 300, Math.random() - 25 );
				scene.add( box );
				phy.addMeshRigidBody( box, { mass: 100, isDynamic: true } );

				const sphere = new THREE.Mesh( geometry2, material );
				sphere.position.set( Math.random() - 15, Math.random() * 700, Math.random() - 15 );
				scene.add( sphere );
				phy.addMeshRigidBody( sphere, { mass: 30, isDynamic: true } );
			}

			const pg = new THREE.BoxGeometry(300, 0.1, 300);
			const plane = new THREE.Mesh( pg, new THREE.MeshBasicMaterial( { color: 0x00aa00 } ) );
			scene.add( plane );
			phy.addMeshRigidBody( plane );

			renderer = new THREE.WebGLRenderer( { antialias: true } );
			//renderer.setClearColor(0x808080);
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.setSize( window.innerWidth, window.innerHeight );
			renderer.setAnimationLoop( animate );
			document.body.appendChild( renderer.domElement );

			const controls = new OrbitControls( camera, renderer.domElement );
			controls.target.y = 0.5;
			controls.update();

			window.addEventListener( 'resize', onWindowResize );

		}

		init();

		function onWindowResize() {

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();

			renderer.setSize( window.innerWidth, window.innerHeight );

		}

		function animate() {

			if ( phy ) phy.stepSimulation( 0.1, 1/60 );

			renderer.render( scene, camera );

		}
	</script>
  </body>
</html>
