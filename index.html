<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

    <title>WEBLPhy</title>
    <meta name="description" content="3d - engine for threejs based on physx-js-webidl written in JavaScript." />
    <meta name="author" content="lovepsone" />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700" rel="stylesheet" />
    <style type="text/css">
      body {
        margin: 0;
        padding: 0;
        font-family: 'Open Sans', monospace;
        color: #111;
      }

      h1 {
        font-size: 4rem;
        margin: 0.75rem 0;
      }

      h2 {
        font-size: 2rem;
        margin: 0.75rem 0;
      }

      a {
        color: #351fad;
      }

      a:hover {
        color: #0366d6;
      }

      .title .github {
        display: inline-block;
        margin-left: 1.5rem;
        width: 2.3rem;
        height: 2.3rem;
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 2.2rem;
        }

        .title .github {
          margin-left: 0.5rem;
          width: 1.3rem;
          height: 1.3rem;
        }
      }

      .description {
        margin-bottom: 4rem;
      }

      .container {
        margin: 0 auto;
        max-width: 64rem;
        padding: 1rem 1rem 5rem;
      }

      .examples {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        grid-gap: 2rem;
      }

      .image {
        display: block;
      }
      .image:hover {
        opacity: 0.9;
      }

      .image img {
        width: 100%;
        border-radius: 3px;
      }

      .caption {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-top: 0.3rem;
      }
      .caption .name {
        display: inline-block;
        font-size: 1.1rem;
        line-height: 1;
        text-decoration: none;
      }
      .caption .name:hover {
        text-decoration: underline;
      }

      .caption .name::first-letter {
        text-transform: capitalize;
      }

      .caption .github {
        width: 1.3rem;
        height: 1.3rem;
      }

      .github img {
        width: 100%;
      }
    </style>
    <script type="module">

    </script>
  </head>

  <body>
    <div class="container">
      <h1 class="title">
        WEBLPhy
        <a
          href="github.com/lovepsone/lovepsone.github.io"
          target="_blank"
          class="github"
          title="View source code for WEBLPhy on GitHub">
          <img src="examples/icons/github.svg" alt="GitHub" />
        </a>
      </h1>

      <div class="description">3D physics engine for the web.</div>

      <h2>
        <a href="https://github.com/lovepsone/lovepsone.github.io/wiki">Documentation</a>
      </h2>

      <br />

      <h2>Examples</h2>
      <div class="examples"></div>
    </div>
  </body>
</html>
